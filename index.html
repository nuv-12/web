<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My YouTube Browser</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .bar { display: flex; padding: 10px; background: #f0f0f0; align-items: center; gap: 10px; }
        button { padding: 8px 12px; font-size: 16px; cursor: pointer; }
        input { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        iframe { flex: 1; border: none; width: 100%; }
    </style>
</head>
<body>

    <div class="bar">
        <button onclick="goBack()">◀</button>
        <button onclick="goForward()">▶</button>
        <input type="text" id="urlInput" value="https://www.youtube.com" onkeydown="if(event.key==='Enter') loadURL()">
        <button onclick="loadURL()">開く</button>
    </div>

    <iframe id="webFrame" src="https://www.youtube.com/embed/"></iframe>

    <script>
        const frame = document.getElementById('webFrame');
        const input = document.getElementById('urlInput');

        function loadURL() {
            let url = input.value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            frame.src = url;
        }

        // 簡易的な戻る・進む（ブラウザの履歴に依存します）
        function goBack() { window.history.back(); }
        function goForward() { window.history.forward(); }
    </script>
</body>
</html>
